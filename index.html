<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigNetwork</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>🚀 BigNetwork</header>

<div class="card">
<h2>💰 Coins</h2>
<h1 id="coins">0</h1>
</div>

<div class="card">
<h2>⛏️ Mining</h2>
<h3 id="miningTimer">Ready</h3>
<button id="mineBtn">Start Mining</button>
</div>

<div class="card">
<h2>📦 Mystery Box</h2>
<h3 id="boxTimer">Ready</h3>
<button id="boxBtn">Open Mystery Box</button>
</div>

<div class="card">
<h2>🎁 Daily Reward</h2>
<h3 id="dailyTimer">Ready</h3>
<button id="dailyBtn">Claim Reward</button>
</div>

<button onclick="invite()">👥 Invite Friends</button>
<button onclick="leaderboard()">🏆 Leaderboard</button>
<button onclick="profile()">👤 Profile</button>

<script src="script.js"></script>
</body>
</html>
